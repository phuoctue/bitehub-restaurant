version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bitehub
      POSTGRES_PASSWORD: bitehub
      POSTGRES_DB: bitehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    volumes:
      - server_uploads:/app/uploads

  client:
    build:
      context: ./client
    env_file:
      - ./client/.env
    depends_on:
      - server
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  server_uploads:
